# Configuration for examples runner
# This file allows fine-grained control over example execution

# Examples to always skip
skip:
  - "examples/ui/interactive_ui_demo.py"  # TUI - requires user interaction
  - "examples/live_feedback/01_simple_keyboard_pause.py"  # Requires keyboard interaction (Space)
  - "examples/live_feedback/02_two_phase_interactive.py"  # Requires user interaction for Q&A
  - "examples/live_feedback/03_smooth_typewriter_rendering.py"  # Requires keyboard interaction (Space, +/-, e, q)
  - "examples/live_feedback/04_feedback_patterns_with_cancellation.py"  # Requires keyboard interaction (Space, f, c, +/-, e, q)
  - "examples/live_feedback/05_textual_chat_interface.py"  # TUI - requires user interaction (Enter, q)
  - "examples/live_feedback/06_multi_threaded_conversation.py"  # TUI - requires user interaction (Enter, Tab, q)
  - "examples/live_feedback/07_minimal_chat.py"  # TUI - requires user interaction (Enter, q)
  - "examples/live_feedback/08_language_switching.py"  # TUI - requires user interaction (button clicks, q)
  - "examples/live_feedback/09_language_switching_local_llm.py"  # TUI - requires local LLM Studio + user interaction

# Custom timeouts for specific examples (in seconds)
timeouts:
  default: 30
  "examples/gemini_architect_example.py": 60  # Makes multiple API calls
  "examples/integrations/pydantic_ai_integration.py": 60  # Complex integration

# API key requirements
# Auto-detected by scanning files, but can be overridden here
requires_api:
  GEMINI_API_KEY:
    - "examples/adapters/02_gemini_auto_detect.py"
    - "examples/adapters/13_manual_chunk_processing.py"
    - "examples/gemini_simple_demo.py"
    - "examples/gemini_architect_example.py"
    - "examples/live_feedback/01_simple_keyboard_pause.py"
    - "examples/live_feedback/02_two_phase_interactive.py"
    - "examples/live_feedback/03_smooth_typewriter_rendering.py"
    - "examples/live_feedback/04_feedback_patterns_with_cancellation.py"
    - "examples/live_feedback/05_textual_chat_interface.py"
    - "examples/live_feedback/06_multi_threaded_conversation.py"
    - "examples/live_feedback/07_minimal_chat.py"
    - "examples/live_feedback/08_language_switching.py"

  OPENAI_API_KEY:
    - "examples/adapters/03_openai_explicit_adapter.py"
    - "examples/integrations/pydantic_ai_integration.py"

  ANTHROPIC_API_KEY:
    - "examples/adapters/04_anthropic_adapter.py"

# Examples that are expected to be slow (for CI optimization)
slow_examples:
  - "examples/gemini_architect_example.py"
  - "examples/integrations/pydantic_ai_integration.py"

# Categories
# Auto-detected from folder structure, but can be customized
categories:
  adapters:
    - "examples/adapters/*.py"
  logging:
    - "examples/logging/*.py"
  live_feedback:
    - "examples/live_feedback/*.py"
  ui:
    - "examples/ui/*.py"
  integrations:
    - "examples/integrations/*.py"
  syntaxes:
    - "examples/syntaxes/*.py"
