site_name: Streamblocks
repo_url: https://github.com/hotherio/streamblocks
repo_name: hotherio/streamblocks
edit_uri: ""
dev_addr: 127.0.0.1:7227
site_dir: "static/docs"
nav:
  - StreamBlocks: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Your First Custom Block: getting-started/first-custom-block.md
  - Concepts:
    - concepts/index.md
    - Blocks & Registry: concepts/blocks-and-registry.md
    - Events: concepts/events.md
    - Syntaxes: concepts/syntaxes.md
    - Adapters: concepts/adapters.md
  - Guides:
    - guides/index.md
    - Defining Custom Blocks: guides/define-custom-blocks.md
    - Validation: guides/validation.md
    - Error Handling: guides/error-handling.md
    - OpenAI, Anthropic & Gemini: guides/providers.md
    - AG-UI Protocol: guides/agui.md
    - Pydantic AI: guides/pydantic-ai.md
    - Logging: guides/logging.md
    - Performance Tuning: guides/performance.md
  - Examples:
    - examples/index.md
    - Quickstart: examples/quickstart.md
    - Basics: examples/basics.md
    - Syntaxes: examples/syntaxes.md
    - Adapters: examples/adapters.md
    - Blocks: examples/blocks.md
    - Integrations: examples/integrations.md
    - Providers: examples/providers.md
  - Reference:
    - reference/index.md
    - Processors: reference/processors.md
    - Registry & Models: reference/registry-and-models.md
    - Events: reference/events.md
    - Syntaxes: reference/syntaxes.md
    - Adapters: reference/adapters.md
    - Parsing & Validation: reference/parsing-and-validation.md
    - Extensions: reference/extensions.md
    - Integrations: reference/integrations.md
  - Contributing: contributing.md
theme:
  name: material
  language: en
  logo: assets/logo.png
  annotation: material/arrow-right-circle
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: pink
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: red
      accent: deep orange
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - header.autohide
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
markdown_extensions:
  - def_list
  - meta
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: true
      dedent_subsections: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.betterem
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - sane_lists
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js
  - javascripts/tablesort.js
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/mermaid.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
extra:
  version:
    provider: mike
  generator: false
watch:
  - src
  - src/hother/streamblocks_examples
  - docs
  - docs/.hooks
hooks:
  - docs/.hooks/main.py
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search:
      lang: en
  - autorefs
  - glightbox
  - redirects:
      redirect_maps:
        getting_started.md: getting-started/quickstart.md
        installation.md: getting-started/installation.md
        basics.md: concepts/index.md
        processing.md: concepts/index.md
        syntaxes.md: concepts/syntaxes.md
        adapters.md: concepts/adapters.md
        events.md: concepts/events.md
        blocks.md: guides/define-custom-blocks.md
        validation.md: guides/validation.md
        errors.md: guides/error-handling.md
        patterns.md: guides/index.md
        performance.md: guides/performance.md
        troubleshooting.md: guides/index.md
        faq.md: index.md
        community.md: index.md
        architecture/index.md: concepts/index.md
        architecture/extensions.md: concepts/adapters.md
        architecture/state-machine.md: concepts/index.md
        architecture/adapters.md: concepts/adapters.md
        integrations/index.md: guides/index.md
        integrations/pydantic_ai.md: guides/pydantic-ai.md
        integrations/agui.md: guides/agui.md
        examples/basic.md: examples/basics.md
        examples/setup.md: examples/index.md
        reference/core.md: reference/processors.md
        reference/blocks.md: reference/registry-and-models.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            show_bases: true
            inherited_members: true
            show_docstring_attributes: true
            show_docstring_functions: true
            show_docstring_classes: true
            show_docstring_modules: true
            show_if_no_docstring: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            filters: ["!^_"]
          selection:
            filters: ["!^_", "!^__"]
          inventories:
          - https://docs.python.org/3/objects.inv
          - https://docs.pydantic.dev/latest/objects.inv
          setup_commands:
            - import sys
            - sys.path.append('../src')
          merge_init_into_class: yes
          show_submodules: no
